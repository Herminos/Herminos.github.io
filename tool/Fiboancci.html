<!DOCTYPE html>
<html>
    <head>
        <title>斐波那契数列</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <p>请在输入框内输入n</p>
        <input id="in">
        <button type="button" onclick="myfunc()">完成</button>
        <p id="ans"></p>
        <script>
            function myfunc()
            {
                var x=document.getElementById("in").value;
                document.getElementById("ans").innerHTML=Fibo(x);
            }
            function Fibo(x)
            {
                if(x==0)
                return 1;
                if(x==1)
                return 1;
                else
                return Fibo(x-1)+Fibo(x-2);
            }
        </script>
    </body>
</html>
